name: Build & Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # OpenVPN portable runtime + TAP-Windows V9 driver. The fetch
      # downloads the official signed MSI from openvpn.org, verifies the
      # Authenticode signature is from "OpenVPN Inc.", then extracts via
      # `msiexec /a` into resources/win32/openvpn/. GH Actions Windows
      # runners run as administrator so msiexec works without elevation.
      # We don't commit these binaries because (a) they're ~10 MB and
      # (b) we want every release to ship the latest upstream signed
      # build. The script is idempotent and self-verifies hashes.
      - name: Fetch OpenVPN portable runtime + TAP driver
        shell: powershell
        run: npm run fetch:openvpn-win

      - name: Build Windows installer
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Suppress build-win.ps1's in-script fetch chain — we already
          # ran fetch above as a discrete step (clearer logs on failure).
          RUD1_SKIP_FETCH: "1"
        run: npm run dist:win:ci

      - name: Stage installer artifact
        shell: pwsh
        run: |
          $file = Get-ChildItem -Path release -Recurse -Filter "*Setup*.exe" | Select-Object -First 1
          if (-not $file) { throw "No NSIS *Setup*.exe produced under release/" }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item $file.FullName artifacts/rud1-Setup.exe -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: artifacts/rud1-Setup.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Git on the Windows dev box can't preserve the +x mode bit, so the
      # committed VirtualHere console client lands as 0644. Restore +x before
      # electron-builder stages it into the AppImage/deb (openvpn + usbip are
      # system-provided on Linux, declared via deb `recommends`).
      - name: Ensure committed Linux binaries are executable
        run: |
          set -eux
          chmod +x resources/linux/vhclientx86_64

      - name: Build Linux artifacts
        run: npm run dist:linux

      - name: Stage Linux artifacts
        run: |
          set -eux
          mkdir -p artifacts
          appimage=$(find release -maxdepth 2 -name "*.AppImage" | head -n 1)
          deb=$(find release -maxdepth 2 -name "*.deb" | head -n 1)
          [ -n "$appimage" ] && cp "$appimage" artifacts/rud1.AppImage
          [ -n "$deb" ] && cp "$deb" artifacts/rud1.deb
          ls -la artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: artifacts/*
          if-no-files-found: error

  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Restore +x on the committed VirtualHere universal client (x86_64 +
      # arm64), dropped to 0644 by the Windows dev box. openvpn is provided by
      # the system (Homebrew) on macOS and resolved via PATH at runtime.
      - name: Ensure committed macOS binaries are executable
        run: |
          set -eux
          chmod +x resources/darwin/vhclient-darwin

      - name: Build macOS DMGs
        env:
          # Skip code signing — we have no Apple Developer cert in CI. The
          # output DMGs are unsigned; users have to right-click → Open the
          # first time.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:mac

      - name: Stage macOS artifacts
        run: |
          set -eux
          mkdir -p artifacts
          for dmg in $(find release -maxdepth 2 -name "*.dmg"); do
            base=$(basename "$dmg")
            cp "$dmg" "artifacts/$base"
          done
          # Preserve arch-suffixed names if electron-builder produced both
          # (rud1-<v>.dmg + rud1-<v>-arm64.dmg). Fall back to a single
          # rud1.dmg if only one was emitted.
          if [ "$(ls artifacts/*.dmg 2>/dev/null | wc -l)" = "1" ]; then
            mv artifacts/*.dmg artifacts/rud1.dmg
          else
            for f in artifacts/*-arm64.dmg; do [ -f "$f" ] && mv "$f" artifacts/rud1-arm64.dmg; done
            for f in artifacts/*.dmg; do
              base=$(basename "$f")
              case "$base" in
                rud1.dmg|rud1-arm64.dmg) ;;
                *) mv "$f" artifacts/rud1.dmg ;;
              esac
            done
          fi
          ls -la artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Publish "latest" release
    needs: [build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: downloaded

      - name: Flatten artifacts
        run: |
          set -eux
          mkdir -p release-files
          find downloaded -type f -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Reset "latest" release + tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          gh release delete latest --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true

      - name: Create "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: false
          target_commitish: ${{ github.sha }}
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Keep the rud1-es desktop manifest (https://rud1.es/desktop/manifest.json)
  # in sync with this release so existing clients actually detect the update.
  # The manifest route reads DESKTOP_LATEST_VERSION / DESKTOP_DOWNLOAD_URL from
  # Vercel env; we upsert them here and redeploy. The Windows installer asset
  # name is stable (rud1-Setup.exe), so the download URL is a constant.
  # Non-fatal: if the Vercel secrets aren't configured yet, this step prints
  # setup instructions and skips instead of failing the release.
  update-manifest:
    name: Sync rud1-es desktop manifest
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upsert Vercel env + redeploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN}" ] || [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "::warning::VERCEL_TOKEN / VERCEL_PROJECT_ID not set — skipping manifest sync."
            echo "Add these repo secrets to enable desktop auto-update detection:"
            echo "  VERCEL_TOKEN, VERCEL_PROJECT_ID, (optional) VERCEL_TEAM_ID, VERCEL_DEPLOY_HOOK_URL"
            exit 0
          fi

          VERSION="$(node -p "require('./package.json').version")"
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/rud1-Setup.exe"
          TEAM_QS=""
          if [ -n "${VERCEL_TEAM_ID}" ]; then TEAM_QS="&teamId=${VERCEL_TEAM_ID}"; fi

          upsert() {
            local key="$1" value="$2"
            echo "Upserting ${key}=${value}"
            local code
            code="$(curl -s -o /tmp/vercel-resp.json -w '%{http_code}' \
              -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?upsert=true${TEAM_QS}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"${key}\",\"value\":\"${value}\",\"type\":\"plain\",\"target\":[\"production\"]}")"
            if [ "${code}" -ge 300 ]; then
              echo "::error::Vercel env upsert for ${key} failed (HTTP ${code})"; cat /tmp/vercel-resp.json; exit 1
            fi
          }

          upsert "DESKTOP_LATEST_VERSION" "${VERSION}"
          upsert "DESKTOP_DOWNLOAD_URL" "${DOWNLOAD_URL}"

          if [ -n "${VERCEL_DEPLOY_HOOK_URL}" ]; then
            echo "Triggering rud1-es redeploy so the new env takes effect…"
            curl -s -X POST "${VERCEL_DEPLOY_HOOK_URL}" >/dev/null
          else
            echo "::warning::VERCEL_DEPLOY_HOOK_URL not set — env updated but rud1-es not redeployed; the manifest will reflect the new version on its next deploy."
          fi
