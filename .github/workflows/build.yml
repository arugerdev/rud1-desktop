name: Build & Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUD1_SKIP_FETCH: "1"
        run: npm run dist:win:ci

      - name: Stage installer artifact
        shell: pwsh
        run: |
          $file = Get-ChildItem -Path release -Recurse -Filter "*Setup*.exe" | Select-Object -First 1
          if (-not $file) { throw "No NSIS *Setup*.exe produced under release/" }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item $file.FullName artifacts/rud1-Setup.exe -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: artifacts/rud1-Setup.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure committed Linux binaries are executable
        run: |
          set -eux
          if [ -f resources/linux/rud1-bridge ]; then
            chmod +x resources/linux/rud1-bridge
          fi
          for f in resources/linux/wg resources/linux/wg-quick resources/linux/usbip resources/linux/usbipd; do
            [ -f "$f" ] && chmod +x "$f" || true
          done

      - name: Build Linux artifacts
        run: npm run dist:linux

      - name: Stage Linux artifacts
        run: |
          set -eux
          mkdir -p artifacts
          appimage=$(find release -maxdepth 2 -name "*.AppImage" | head -n 1)
          deb=$(find release -maxdepth 2 -name "*.deb" | head -n 1)
          [ -n "$appimage" ] && cp "$appimage" artifacts/rud1.AppImage
          [ -n "$deb" ] && cp "$deb" artifacts/rud1.deb
          ls -la artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: artifacts/*
          if-no-files-found: error

  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure committed macOS binaries are executable
        run: |
          set -eux
          for f in resources/darwin/rud1-bridge-x64 resources/darwin/rud1-bridge-arm64 \
                   resources/darwin/wg resources/darwin/wg-quick resources/darwin/wireguard-go; do
            [ -f "$f" ] && chmod +x "$f" || true
          done

      - name: Build macOS DMGs
        env:
          # Skip code signing — we have no Apple Developer cert in CI. The
          # output DMGs are unsigned; users have to right-click → Open the
          # first time.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:mac

      - name: Stage macOS artifacts
        run: |
          set -eux
          mkdir -p artifacts
          for dmg in $(find release -maxdepth 2 -name "*.dmg"); do
            base=$(basename "$dmg")
            cp "$dmg" "artifacts/$base"
          done
          # Preserve arch-suffixed names if electron-builder produced both
          # (rud1-<v>.dmg + rud1-<v>-arm64.dmg). Fall back to a single
          # rud1.dmg if only one was emitted.
          if [ "$(ls artifacts/*.dmg 2>/dev/null | wc -l)" = "1" ]; then
            mv artifacts/*.dmg artifacts/rud1.dmg
          else
            for f in artifacts/*-arm64.dmg; do [ -f "$f" ] && mv "$f" artifacts/rud1-arm64.dmg; done
            for f in artifacts/*.dmg; do
              base=$(basename "$f")
              case "$base" in
                rud1.dmg|rud1-arm64.dmg) ;;
                *) mv "$f" artifacts/rud1.dmg ;;
              esac
            done
          fi
          ls -la artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Publish "latest" release
    needs: [build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: downloaded

      - name: Flatten artifacts
        run: |
          set -eux
          mkdir -p release-files
          find downloaded -type f -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Reset "latest" release + tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          gh release delete latest --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true

      - name: Create "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: false
          target_commitish: ${{ github.sha }}
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
